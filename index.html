<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LTO Motorcycle Reviewer Exam</title>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Arial", "sans-serif"]
          }
        }
      }
    };
  </script>
  <script>
    (function () {
      var savedTheme = localStorage.getItem("ltoMotorcycleTheme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-full bg-slate-50 text-slate-950 antialiased transition-colors dark:bg-zinc-950 dark:text-zinc-50">
  <div class="min-h-screen">
    <header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/90 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/90">
      <div class="mx-auto flex max-w-4xl items-center justify-between gap-3 px-4 py-3 sm:px-6">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-teal-700 dark:text-teal-300">LTO Reviewer</p>
          <h1 class="text-base font-bold sm:text-lg">Non-Professional Motorcycle Exam</h1>
        </div>
        <button id="themeToggle" type="button" class="min-h-11 rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 transition hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-teal-600 dark:border-zinc-700 dark:text-zinc-100 dark:hover:bg-zinc-900">
          Dark
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-5 sm:px-6 sm:py-8">
      <noscript>
        <div class="rounded-lg border border-red-300 bg-red-50 p-4 text-sm text-red-800 dark:border-red-800 dark:bg-red-950 dark:text-red-100">
          This reviewer needs JavaScript enabled to load questions and save your exam progress.
        </div>
      </noscript>

      <section id="statusPanel" class="mb-4 hidden rounded-lg border border-amber-300 bg-amber-50 p-4 text-sm text-amber-900 dark:border-amber-700 dark:bg-amber-950 dark:text-amber-100" aria-live="polite"></section>

      <section id="app" aria-live="polite">
        <div class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
          <div class="loading-line mb-4 h-3 w-2/3 rounded-full bg-slate-200 dark:bg-zinc-800"></div>
          <div class="loading-line mb-3 h-3 w-full rounded-full bg-slate-200 dark:bg-zinc-800"></div>
          <div class="loading-line h-3 w-5/6 rounded-full bg-slate-200 dark:bg-zinc-800"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
